<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2c1f12"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d6c6"/>
      <stop offset="100%" stop-color="#e8c4b0"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="laptopScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Books (stack) -->
  <rect x="140" y="280" width="180" height="18" rx="4" fill="#f97316" opacity="0.9"/>
  <rect x="135" y="295" width="190" height="16" rx="4" fill="#14b8a6" opacity="0.9"/>
  <rect x="145" y="308" width="170" height="14" rx="4" fill="#ec4899" opacity="0.9"/>
  <!-- Laptop base -->
  <rect x="160" y="290" width="140" height="12" rx="3" fill="#94a3b8"/>
  <rect x="165" y="262" width="130" height="28" rx="4" fill="#e2e8f0"/>
  <rect x="168" y="265" width="124" height="22" rx="3" fill="url(#laptopScreen)"/>
  <!-- Screen content (lines) -->
  <line x1="175" y1="272" x2="255" y2="272" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="175" y1="278" x2="240" y2="278" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <!-- Body/Torso -->
  <rect x="175" y="200" width="110" height="90" rx="20" fill="url(#shirt)"/>
  <!-- Arms -->
  <path d="M175 220 Q150 240 165 280" stroke="#f5d6c6" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M285 220 Q300 240 290 280" stroke="#f5d6c6" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="210" y="185" width="40" height="20" rx="5" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="230" cy="155" rx="45" ry="50" fill="url(#skin)"/>
  <!-- Hair -->
  <ellipse cx="230" cy="130" rx="48" ry="40" fill="url(#hair)"/>
  <path d="M182 140 Q185 100 230 90 Q275 100 278 140" fill="url(#hair)"/>
  <!-- Eyes -->
  <ellipse cx="215" cy="155" rx="5" ry="6" fill="#2c1f12"/>
  <ellipse cx="245" cy="155" rx="5" ry="6" fill="#2c1f12"/>
  <circle cx="217" cy="153" r="2" fill="white" opacity="0.5"/>
  <circle cx="247" cy="153" r="2" fill="white" opacity="0.5"/>
  <!-- Smile -->
  <path d="M220 170 Q230 178 240 170" stroke="#c27a6e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="215" cy="155" rx="12" ry="10" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
  <circle cx="245" cy="155" rx="12" ry="10" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
  <line x1="227" y1="155" x2="233" y2="155" stroke="#4f46e5" stroke-width="2.5"/>
  <!-- Legs -->
  <rect x="185" y="290" width="35" height="35" rx="8" fill="#1e293b"/>
  <rect x="240" y="290" width="35" height="35" rx="8" fill="#1e293b"/>
  <!-- Feet -->
  <rect x="180" y="318" width="42" height="12" rx="6" fill="#475569"/>
  <rect x="238" y="318" width="42" height="12" rx="6" fill="#475569"/>
</svg>
